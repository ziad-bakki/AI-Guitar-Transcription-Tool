<!DOCTYPE html>
<html>

<head>
  <title>basic-pitch experiment</title>
</head>

<body>
  <input type="file" id="fileInput" accept=".mp3,.wav,.m4a" />
  <pre id="output">Drop a file to see raw note events...</pre>

  <script type="module">
    import {
      BasicPitch,
      noteFramesToTime,
      addPitchBendsToNoteEvents,
      outputToNotesPoly
    } from "https://unpkg.com/@spotify/basic-pitch@1.0.1/dist/index.js";

    const MODEL_URL = "https://unpkg.com/@spotify/basic-pitch@1.0.1/model/model.json";
    const out = document.getElementById("output");

    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      out.textContent = "Decoding audio...";

      const arrayBuffer = await file.arrayBuffer();
      const audioCtx = new AudioContext();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

      out.textContent = "Running model (this takes a moment)...";

      const basicPitch = new BasicPitch(MODEL_URL);
      const frames = [], onsets = [], contours = [];

      await basicPitch.evaluateModel(
        audioBuffer,
        (f, o, c) => {frames.push(...f); onsets.push(...o); contours.push(...c);},
        (pct) => {out.textContent = `Transcribing... ${Math.round(pct * 100)}%`;}
      );

      const notes = noteFramesToTime(
        addPitchBendsToNoteEvents(
          contours,
          outputToNotesPoly(frames, onsets, 0.25, 0.25, 5)
        )
      );

      // LOG THE RAW OUTPUT — study this
      console.log("Raw notes:", notes);
      console.log("First note:", notes[0]);
      console.log("Total notes detected:", notes.length);

      out.textContent = JSON.stringify(notes.slice(0, 20), null, 2);
    });
  </script>
</body>

</html>
